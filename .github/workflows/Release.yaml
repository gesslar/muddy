name: Release

on:
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  Release:
    if: ${{ github.event.pull_request.merged == true }}
    uses: gesslar/Maint/.github/workflows/Release.yaml@main
    secrets: inherit
    permissions:
      contents: write

  AttachMpackage:
    needs: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Muddy mpackage
        run: node src/cli.js mpackage -n

      - name: Attach mpackage to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(jq -r .version package.json)"

          # The reusable Release workflow only cuts a release when the version was
          # bumped. If there's no release for this tag, there's nothing to attach.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" mpackage/build/Muddy.mpackage --clobber
            echo "Attached Muddy.mpackage to release $TAG"
          else
            echo "No release found for $TAG; skipping mpackage attach."
          fi
